<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor para EPUB</title>
    <style>
        body { font-family: 'Times New Roman', serif; max-width: 800px; margin: 0 auto; padding: 40px; line-height: 1.6; color: #333; }
        h1 { color: #8b4513; text-align: center; border-bottom: 2px solid #8b4513; padding-bottom: 10px; margin-top: 50px; page-break-before: always; }
        h2 { color: #d35400; margin-top: 40px; }
        h3 { font-size: 1.1em; margin-top: 20px; }
        .item { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px dashed #ccc; }
        hr { border: 1px solid #8b4513; margin: 60px 0; }
    </style>
</head>
<body>
    <h1 style="border:none; font-size: 2.5em; margin-bottom: 0;">Mis recetas</h1>
    <h2 style="text-align: center; color: #666; margin-top: 5px;">Un paseo culinario por los sabores de casa</h2>
    
    <div id="output">Cargando el contenido de tus archivos JSON...</div>

    <script>
        async function extraer() {
            const out = document.getElementById('output');
            let html = '';

            try {
                // Extraer Recetas
                const rRec = await fetch('recetas.json');
                const recetas = await rRec.json();
                html += '<h1>El Recetario</h1>';
                
                recetas.forEach(r => {
                    html += `<div class="item">`;
                    html += `<h2>${r.title}</h2>`;
                    html += `<p><strong>Categoría:</strong> ${r.category || 'General'}</p>`;
                    html += `<h3>Ingredientes</h3><ul>`;
                    if(Array.isArray(r.ingredients)) {
                        r.ingredients.forEach(i => html += `<li>${i}</li>`);
                    }
                    html += `</ul><h3>Preparación</h3>`;
                    const inst = Array.isArray(r.instructions) ? r.instructions.join('<br><br>') : r.instructions;
                    html += `<p>${inst}</p>`;
                    if(r.authorComments) {
                        html += `<p><em>Nota del autor: ${r.authorComments}</em></p>`;
                    }
                    html += `</div>`;
                });

                // Extraer Especias
                const rEsp = await fetch('especias.json');
                const especias = await rEsp.json();
                html += '<h1>Las Especias</h1>';
                
                especias.forEach(e => {
                    html += `<div class="item">`;
                    html += `<h2>${e.flag || ''} ${e.title}</h2>`;
                    html += `<p><em>${e.introduction || ''}</em></p>`;
                    if(e.sections) {
                        e.sections.forEach(s => {
                            html += `<h3>${s.title}</h3><p>${s.content}</p>`;
                        });
                    }
                    html += `</div>`;
                });

                out.innerHTML = html;
            } catch (err) {
                out.innerHTML = '<p style="color:red;">Error cargando los JSON. Recordá abrir este archivo usando Live Server o tu servidor local.</p>';
            }
        }
        extraer();
    </script>
</body>
</html>
