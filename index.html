<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario de Especias y Recetas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-marron: #4a3728;
            --color-accent: #8b4513;
            --color-bg: #f4f1ea;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-marron);
            scroll-behavior: smooth;
        }

        .slide {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        #portada {
            background-color: #000;
            padding: 0;
        }
        #portada img {
            max-width: 100%;
            height: 100vh;
            object-fit: contain;
        }

        .card {
            background: var(--color-crema);
            max-width: 850px;
            width: 100%;
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            border: 1px solid #e2d9c8;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
        }

        .flag { font-size: 2rem; margin-bottom: 10px; display: block; }
        
        .intro {
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #6d5b4e;
            line-height: 1.6;
        }

        .section-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--color-accent);
            margin-bottom: 10px;
            border-bottom: 1px solid #dcd1ba;
            padding-bottom: 5px;
        }

        .section-content {
            margin-bottom: 25px;
            line-height: 1.7;
            font-weight: 300;
        }

        .category-tag {
            display: inline-block;
            background: #e9e2d3;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        nav button {
            background: white;
            border: 1px solid #ccc;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s;
        }
        nav button:hover { background: var(--color-marron); color: white; }

        @media (max-width: 600px) {
            .card { padding: 25px; }
            nav { bottom: 20px; top: auto; width: 100%; justify-content: center; right: 0; }
        }
    </style>
</head>
<body>

<nav>
    <button onclick="document.getElementById('portada').scrollIntoView()">Portada</button>
    <button onclick="document.getElementById('glosario-container').scrollIntoView()">Especias</button>
    <button onclick="document.getElementById('recetario-container').scrollIntoView()">Recetas</button>
</nav>

<section id="portada" class="slide">
    <img src="image_d6412b.jpg" alt="Portada Paseo Culinario">
</section>

<div id="glosario-container"></div>
<div id="recetario-container"></div>

<script>
    async function cargarDatos() {
        try {
            // 1. Cargar y ordenar Especias
            const respEspecias = await fetch('especias.json');
            let especias = await respEspecias.json();
            
            // Forzar ordenamiento alfabético estricto por título
            especias.sort((a, b) => a.title.localeCompare(b.title));
            
            const glosarioDiv = document.getElementById('glosario-container');
            especias.forEach(e => {
                glosarioDiv.innerHTML += `
                    <section class="slide">
                        <div class="card">
                            <span class="flag">${e.flag || ''}</span>
                            <span class="category-tag">${e.category || ''}</span>
                            <h1>${e.title}</h1>
                            <p class="intro">${e.introduction || ''}</p>
                            ${(e.sections || []).map(s => `
                                <div class="section-title">${s.title}</div>
                                <div class="section-content">${s.content}</div>
                            `).join('')}
                        </div>
                    </section>
                `;
            });

            // 2. Cargar y ordenar Recetas
            const respRecetas = await fetch('recetas.json');
            let recetas = await respRecetas.json();
            
            // Forzar ordenamiento alfabético en el recetario
            recetas.sort((a, b) => a.title.localeCompare(b.title));
            
            const recetarioDiv = document.getElementById('recetario-container');
            recetas.forEach(r => {
                // Manejar la preparación ya sea una cadena de texto o un array
                let preparacionHtml = '';
                if (Array.isArray(r.instructions)) {
                    preparacionHtml = `<ol class="section-content">${r.instructions.map(i => `<li>${i}</li>`).join('')}</ol>`;
                } else if (r.instructions) {
                    preparacionHtml = `<div class="section-content">${r.instructions.split(',').join('<br><br>')}</div>`;
                }

                recetarioDiv.innerHTML += `
                    <section class="slide">
                        <div class="card">
                            <span class="category-tag">${r.category || 'Receta'}</span>
                            <h1>${r.title}</h1>
                            
                            <div class="section-title">Ingredientes</div>
                            <ul class="section-content">
                                ${(r.ingredients || []).map(i => `<li>${i}</li>`).join('')}
                            </ul>
                            
                            <div class="section-title">Preparación</div>
                            ${preparacionHtml}
                            
                            ${r.authorComments ? `
                                <div class="section-title">Comentarios del Autor</div>
                                <div class="section-content"><i>${r.authorComments}</i></div>
                            ` : ''}
                        </div>
                    </section>
                `;
            });

        } catch (error) {
            console.error("Error en el Motor de Carga:", error);
        }
    }

    window.onload = cargarDatos;
</script>

</body>
</html>
