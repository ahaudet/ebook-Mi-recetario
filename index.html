<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Recetas y Las Especias</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-marron: #4a3728;
            --color-accent: #8b4513;
            --color-bg: #f4f1ea;
            --color-oro: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-marron);
            overflow-x: hidden;
        }

        /* Sistema de Páginas */
        .page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 20px;
            position: relative;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Portada Principal */
        #portada-principal {
            background-color: #000;
            padding: 0;
            cursor: pointer;
        }
        .img-portada {
            max-width: 100%;
            height: 100vh;
            object-fit: contain;
        }
        .tap-indicator {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Tarjetas Estilo Libro */
        .card {
            background: var(--color-crema);
            max-width: 600px;
            width: 100%;
            min-height: 85vh;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e2d9c8;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-align: center;
            margin-top: 0;
            color: var(--color-marron);
        }

        /* Botones Premium */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .btn-menu {
            background: #ffffff;
            border: 1px solid var(--color-oro);
            padding: 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--color-marron);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .btn-menu:hover {
            background: var(--color-marron);
            color: var(--color-crema);
            transform: translateY(-2px);
        }

        /* Grilla de Especias Adaptable */
        .abc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }
        .abc-grid .btn-menu {
            font-size: 0.75rem;
            padding: 12px 5px;
            text-transform: none;
            white-space: normal;
            word-wrap: break-word;
        }
        @media (min-width: 600px) {
            .abc-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* Navegación Interna */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
            gap: 10px;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid var(--color-marron);
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }

        /* Estilos de Contenido */
        .section-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: var(--color-accent);
            margin: 15px 0 5px 0;
            border-bottom: 1px solid #dcd1ba;
            padding-bottom: 3px;
        }
        .section-content { line-height: 1.6; font-size: 0.95rem; font-weight: 300; margin-bottom: 10px;}
        .flag { font-size: 2rem; text-align: center; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="portada-principal" class="page active" onclick="goPage('indice-general')">
        <img src="image_d6412b.jpg" class="img-portada" alt="Portada Principal">
        <div class="tap-indicator">── Toca para abrir ──</div>
    </div>

    <div id="indice-general" class="page">
        <div class="card">
            <h1 style="margin-bottom: 40px;">Menú Principal</h1>
            <div class="menu-grid">
                <button class="btn-menu" onclick="goPage('indice-recetas')">El Recetario</button>
                <button class="btn-menu" onclick="goPage('indice-especias')">Las Especias</button>
                
                <div style="margin-top: 50px; text-align: center;">
                    <button onclick="goPage('portada-principal')" style="background: none; border: none; color: #a09080; text-decoration: underline; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; cursor: pointer; letter-spacing: 1px; text-transform: uppercase;">
                        ⬅ Salir a la Portada
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="indice-recetas" class="page">
        <div class="card">
            <h1>El Recetario</h1>
            <div class="menu-grid">
                <button class="btn-menu" style="background: #fdfaf5; border-color: var(--color-marron);" onclick="mostrarTodasLasRecetas()">📖 Ver Todo el Recetario</button>
                <button class="btn-menu" onclick="filtrarRecetas('Entradas')">Entradas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Dips')">Dips</button>
                <button class="btn-menu" onclick="filtrarRecetas('Plato Principal')">Plato Principal</button>
                <button class="btn-menu" onclick="filtrarRecetas('Ensaladas')">Ensaladas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Acompañamiento')">Acompañamiento</button>
                <button class="btn-menu" onclick="filtrarRecetas('Conservas')">Conservas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Postres')">Postres</button>
                <button class="btn-menu" onclick="filtrarRecetas('Dulces')">Dulces</button>
            </div>
            <div class="nav-controls">
                <button class="btn-nav" onclick="goPage('indice-general')">⬅ Volver al Inicio</button>
            </div>
        </div>
    </div>

    <div id="indice-especias" class="page">
        <div class="card">
            <h1>Las Especias</h1>
            <p style="text-align:center; font-style:italic; font-size: 0.9rem;">Seleccione un ingrediente</p>
            <div id="abc-container" class="abc-grid"></div>
            <div class="nav-controls">
                <button class="btn-nav" onclick="goPage('indice-general')">⬅ Volver al Inicio</button>
            </div>
        </div>
    </div>

    <div id="hoja-libro" class="page">
        <div class="card" id="contenido-hoja"></div>
    </div>

<script>
    let database = { especias: [], recetas: [] };
    let listaFiltradaActual = [];
    let indiceActual = 0;
    let modoActual = '';

    function goPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(pageId);
        if(target) {
            target.classList.add('active');
            window.scrollTo(0,0);
        }
    }

    async function inicializarMotor() {
        try {
            const rEsp = await fetch('especias.json');
            database.especias = await rEsp.json();
            database.especias.sort((a, b) => a.title.localeCompare(b.title));

            const rRec = await fetch('recetas.json');
            database.recetas = await rRec.json();
            database.recetas.sort((a, b) => a.title.localeCompare(b.title));

            const abcContainer = document.getElementById('abc-container');
            abcContainer.innerHTML = '';
            database.especias.forEach((esp, idx) => {
                let btn = document.createElement('button');
                btn.className = 'btn-menu';
                btn.innerText = esp.title;
                btn.onclick = () => {
                    modoActual = 'especia';
                    listaFiltradaActual = database.especias;
                    indiceActual = idx;
                    renderizarHoja();
                };
                abcContainer.appendChild(btn);
            });
        } catch (e) { console.error("Error de carga:", e); }
    }

    function mostrarTodasLasRecetas() {
        modoActual = 'receta';
        listaFiltradaActual = database.recetas;
        indiceActual = 0;
        renderizarHoja();
    }

    function filtrarRecetas(cat) {
        modoActual = 'receta';
        listaFiltradaActual = database.recetas.filter(r => r.category === cat);
        if(listaFiltradaActual.length === 0) {
            alert("No hay recetas en esta categoría.");
            return;
        }
        indiceActual = 0;
        renderizarHoja();
    }

    function renderizarHoja() {
        const contenedor = document.getElementById('contenido-hoja');
        const item = listaFiltradaActual[indiceActual];
        let html = '';

        if (modoActual === 'especia') {
            html = `
                <span class="flag">${item.flag || '🌶️'}</span>
                <h1>${item.title}</h1>
                <p style="text-align:center; font-size:0.7rem; text-transform:uppercase; color:var(--color-accent); font-weight:600;">${item.category || ''}</p>
                <p class="section-content" style="font-style:italic; text-align:center;">${item.introduction || ''}</p>
                ${(item.sections || []).map(s => `
                    <div class="section-title">${s.title}</div>
                    <div class="section-content">${s.content}</div>
                `).join('')}
                <div class="nav-controls" style="justify-content:center;">
                    <button class="btn-menu" style="width:100%;" onclick="goPage('indice-especias')">⬅ Volver a Las Especias</button>
                </div>
            `;
        } else {
            html = `
                <h1>${item.title}</h1>
                <p style="text-align:center; font-size:0.7rem; text-transform:uppercase; color:var(--color-accent); font-weight:600;">${item.category}</p>
                <div class="section-title">Ingredientes</div>
                <ul class="section-content" style="padding-left:20px;">
                    ${(item.ingredients || []).map(i => `<li>${i}</li>`).join('')}
                </ul>
                <div class="section-title">Preparación</div>
                <div class="section-content">${Array.isArray(item.instructions) ? item.instructions.join('<br><br>') : item.instructions}</div>
                
                <div class="nav-controls">
                    <button class="btn-nav" onclick="${indiceActual > 0 ? `cambiarHoja(-1)` : `goPage('indice-recetas')`}">
                        ${indiceActual > 0 ? '◀ Anterior' : '⬅ Volver al Índice'}
                    </button>
                    <button class="btn-nav" onclick="${indiceActual < listaFiltradaActual.length - 1 ? `cambiarHoja(1)` : `goPage('indice-recetas')`}">
                        ${indiceActual < listaFiltradaActual.length - 1 ? 'Siguiente ▶' : 'Fin'}
                    </button>
                </div>

                <div style="margin-top: 15px; width: 100%; display: flex; justify-content: center;">
                    <button class="btn-menu" style="width: 100%; font-size: 0.7rem; padding: 12px;" onclick="goPage('indice-general')">
                        🏠 Volver al Inicio General
                    </button>
                </div>
            `;
        }
        contenedor.innerHTML = html;
        goPage('hoja-libro');
    }

    function cambiarHoja(dir) {
        indiceActual += dir;
        renderizarHoja();
    }

    window.onload = inicializarMotor;
</script>
</body>
</html>
