<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Recetas y Las Especias</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-marron: #4a3728;
            --color-accent: #8b4513;
            --color-bg: #f4f1ea;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-marron);
            overflow-x: hidden;
        }

        /* Sistema de Páginas/Vistas */
        .page {
            display: none; /* Ocultamos todas por defecto */
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 20px;
            position: relative;
        }

        .page.active {
            display: flex; /* Solo se muestra la página activa */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Portadas */
        #portada-principal, #portada-especias {
            background-color: #000;
            padding: 0;
        }
        .img-portada {
            max-width: 100%;
            height: 100vh;
            object-fit: contain;
            cursor: pointer;
        }

        /* Tarjetas de Contenido (Estilo Libro) */
        .card {
            background: var(--color-crema);
            max-width: 600px;
            width: 100%;
            min-height: 80vh;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 1px solid #e2d9c8;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            text-align: center;
            margin-top: 0;
            color: var(--color-marron);
        }

        /* Botones e Índices */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

       /* Botones con estilo más profesional */
.btn-menu {
    background: #ffffff;
    border: 1px solid #d4af37; /* Dorado sutil */
    padding: 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #4a3728;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.btn-menu:hover {
    background: #4a3728;
    color: #fdfaf5;
    transform: translateY(-2px);
}

/* Indicador de "Tocar" en Portada */
.tap-indicator {
    position: absolute;
    bottom: 30px;
    color: white;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}
        }

        /* Índice Alfabético para Las Especias */
        .abc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        /* Botones de Navegación del Libro (Abajo) */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid var(--color-marron);
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            border-radius: 4px;
        }
        .btn-nav:hover { background: var(--color-marron); color: white; }

        /* Detalles de las Hojas de Contenido */
        .section-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--color-accent);
            margin: 20px 0 5px 0;
            border-bottom: 1px solid #dcd1ba;
            padding-bottom: 3px;
        }
        .section-content { line-height: 1.6; font-weight: 300; margin-bottom: 10px;}
        .flag { font-size: 2rem; text-align: center; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

   <!-- 1. PORTADA CON INDICADOR -->
<div id="portada-principal" class="page active" onclick="goPage('indice-general')">
    <img src="image_d6412b.jpg" class="img-portada" alt="Portada Principal">
    <div class="tap-indicator">── Tocar para abrir ──</div>
</div>

<!-- 2. ÍNDICE GENERAL (Mejorado) -->
<div id="indice-general" class="page">
    <div class="card">
        <h1 style="margin-bottom: 40px;">Menú Principal</h1>
        <div class="menu-grid">
            <!-- Quitamos los iconos "pedorros" y dejamos estilo limpio -->
            <button class="btn-menu" onclick="goPage('indice-recetas')">El Recetario</button>
            <!-- CAMBIO CLAVE: Aquí saltamos directo al índice de especias -->
            <button class="btn-menu" onclick="goPage('indice-especias')">Las Especias</button>
        </div>
    </div>
</div>

    <div id="indice-recetas" class="page">
        <div class="card">
            <h1>El Recetario</h1>
            <div class="menu-grid">
                <!-- Agregá esto arriba de los otros botones de categorías -->
<button class="btn-menu" onclick="mostrarTodasLasRecetas()">📖 Ver Todo el Recetario</button>
                <button class="btn-menu" onclick="filtrarRecetas('Entradas')">Entradas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Dips')">Dips</button>
                <button class="btn-menu" onclick="filtrarRecetas('Plato Principal')">Plato Principal</button>
                <button class="btn-menu" onclick="filtrarRecetas('Ensaladas')">Ensaladas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Acompañamiento')">Acompañamiento</button>
                <button class="btn-menu" onclick="filtrarRecetas('Conservas')">Conservas</button>
                <button class="btn-menu" onclick="filtrarRecetas('Postres')">Postres</button>
                <button class="btn-menu" onclick="filtrarRecetas('Dulces')">Dulces</button>
            </div>
            <div class="nav-controls">
                <button class="btn-nav" onclick="goPage('indice-general')">⬅ Volver al Índice General</button>
            </div>
        </div>
    </div>

    <div id="portada-especias" class="page" onclick="goPage('indice-especias')">
        <img src="image_d6412b.jpg" class="img-portada" alt="Portada Las Especias">
    </div>

    <div id="indice-especias" class="page">
        <div class="card">
            <h1>Las Especias</h1>
            <p style="text-align:center; font-style:italic;">Seleccione una para ver su detalle</p>
            <div id="abc-container" class="abc-grid">
                </div>
            <div class="nav-controls" style="margin-top: auto;">
                <button class="btn-nav" onclick="goPage('indice-general')">⬅ Volver al Índice General</button>
            </div>
        </div>
    </div>

    <div id="hoja-libro" class="page">
        <div class="card" id="contenido-hoja">
            </div>
    </div>


<script>
    // Variables Globales del Motor
    let database = { especias: [], recetas: [] };
    let listaFiltradaActual = [];
    let indiceActual = 0;
    let modoActual = ''; // 'especia' o 'receta'

    // Cambiar de pantalla (página)
    function goPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
    }

    // Cargar los JSON y ordenarlos de entrada al iniciar
    async function inicializarMotor() {
        try {
            // Cargar y ordenar Especias
            const rEsp = await fetch('especias.json');
            database.especias = await rEsp.json();
            database.especias.sort((a, b) => a.title.localeCompare(b.title));

            // Cargar y ordenar Recetas
            const rRec = await fetch('recetas.json');
            database.recetas = await rRec.json();
            database.recetas.sort((a, b) => a.title.localeCompare(b.title));

            // Armar el índice de "Las Especias"
            const abcContainer = document.getElementById('abc-container');
            database.especias.forEach((esp, idx) => {
                let btn = document.createElement('button');
                btn.className = 'btn-menu';
                btn.style.fontSize = '0.85rem';
                btn.style.padding = '10px 5px';
                btn.innerText = esp.title;
                btn.onclick = () => verEspecia(idx);
                abcContainer.appendChild(btn);
            });

        } catch (e) {
            console.error("Error inicializando los datos:", e);
        }
    }

    // Mostrar una Especia específica
    function verEspecia(index) {
        modoActual = 'especia';
        listaFiltradaActual = database.especias;
        indiceActual = index;
        renderizarHoja();
    }

    // Filtrar recetas por las 8 categorías principales
    function filtrarRecetas(categoria) {
        modoActual = 'receta';
        listaFiltradaActual = database.recetas.filter(r => r.category === categoria);
        indiceActual = 0;

        if(listaFiltradaActual.length === 0) {
            alert("No hay recetas cargadas en la categoría: " + categoria);
            return;
        }
        renderizarHoja();
    }
    // Esta función ignora las categorías y te muestra el libro completo de la A a la Z
function mostrarTodasLasRecetas() {
    modoActual = 'receta';
    listaFiltradaActual = database.recetas; // Usa la base de datos completa sin filtrar
    indiceActual = 0;
    renderizarHoja();
}

    // Renderizar la Hoja Activa (Efecto Libro)
    function renderizarHoja() {
        const contenedor = document.getElementById('contenido-hoja');
        const item = listaFiltradaActual[indiceActual];
        
        let html = '';

        if (modoActual === 'especia') {
    html = `
        <span class="flag">${item.flag || '🌶️'}</span>
        <h1>${item.title}</h1>
        <p style="text-align:center; font-size:0.8rem; text-transform:uppercase; color:var(--color-accent);">${item.category || ''}</p>
        <p class="section-content" style="font-style:italic; text-align:center;">${item.introduction || ''}</p>
        
        ${(item.sections || []).map(s => `
            <div class="section-title">${s.title}</div>
            <div class="section-content">${s.content}</div>
        `).join('')}
        
        <div class="nav-controls" style="justify-content: center; margin-top: 30px; width: 100%;">
            <button class="btn-menu" style="width: 100%; max-width: 300px; font-size: 0.8rem;" onclick="goPage('indice-especias')">
                ⬅ Volver a Las Especias
            </button>
        </div>
    `;
}
                
                <div class="nav-controls">
                    <button class="btn-nav" onclick="${indiceActual > 0 ? `cambiarHoja(-1)` : `goPage('indice-especias')`}">
                        ${indiceActual > 0 ? '◀ Anterior' : '⬅ Volver al Índice'}
                    </button>
                    <button class="btn-nav" onclick="${indiceActual < listaFiltradaActual.length - 1 ? `cambiarHoja(1)` : `goPage('indice-especias')`}">
                        ${indiceActual < listaFiltradaActual.length - 1 ? 'Siguiente ▶' : 'Fin (Volver)'}
                    </button>
                </div>
            `;
        } else {
            // Modo Receta
            html = `
                <h1>${item.title}</h1>
                <p style="text-align:center; font-size:0.8rem; text-transform:uppercase; color:var(--color-accent); font-weight:600;">${item.category}</p>
                
                <div class="section-title">Ingredientes</div>
                <ul class="section-content" style="padding-left:20px;">
                    ${(item.ingredients || []).map(i => `<li>${i}</li>`).join('')}
                </ul>
                
                <div class="section-title">Preparación</div>
                <div class="section-content">${Array.isArray(item.instructions) ? item.instructions.join('<br><br>') : item.instructions || ''}</div>
                
                ${item.authorComments ? `
                    <div class="section-title">Notas del Autor</div>
                    <div class="section-content" style="font-style:italic;">${item.authorComments}</div>
                ` : ''}

                <div class="nav-controls">
                    <button class="btn-nav" onclick="${indiceActual > 0 ? `cambiarHoja(-1)` : `goPage('indice-recetas')`}">
                        ${indiceActual > 0 ? '◀ Anterior' : '⬅ Volver al Índice'}
                    </button>
                    <button class="btn-nav" onclick="${indiceActual < listaFiltradaActual.length - 1 ? `cambiarHoja(1)` : `goPage('indice-recetas')`}">
                        ${indiceActual < listaFiltradaActual.length - 1 ? 'Siguiente ▶' : 'Fin (Volver)'}
                    </button>
                </div>
            `;
        }

        contenedor.innerHTML = html;
        goPage('hoja-libro');
    }

    // Pasar páginas hacia adelante o atrás
    function cambiarHoja(direccion) {
        indiceActual += direccion;
        renderizarHoja();
    }

    // Inicializar al cargar ventana
    window.onload = inicializarMotor;
</script>

</body>
</html>
